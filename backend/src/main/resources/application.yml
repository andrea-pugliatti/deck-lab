spring:
  config:
    import: optional:classpath:prompts.yml
  application:
    name: backend
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:test-api-key}
        chat:
          model: gemini-3.1-flash-lite
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/deck-lab?reWriteBatchedInserts=true
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  seed.cards: false
  seed.users: false
  upload-dir: ${IMAGE_UPLOAD_DIR:data/images}
  cors.allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:5173,http://localhost,http://127.0.0.1:5173}
  cookie:
    same-site: ${COOKIE_SAME_SITE:Lax}
    secure: ${COOKIE_SECURE:true}

jwt:
  secret: ${JWT_SECRET:ejM4YTNjNWQ3ZTkxYmI4Y2U5Mzg1NzlkMmVkMjE5ODk5ZjhkMDgxODg0YzdkNjU5YTJmZWFhMGM1NWFkMDE1YTNmZjRmMWIyYjBiODIyY2QxNWQ2YzE1YjBmMDBhMDg=}
  expiration: 900000

refresh-token:
  duration-days: 7
  max-per-user: 5
  cleanup-schedule: "0 0 3 * * *"
  grace-period-seconds: 10
  rate-limit:
    max-attempts: 5
    window-ms: 60000
    cleanup-schedule: "0 */5 * * * *"
