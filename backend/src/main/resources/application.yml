spring:
    application:
        name: backend
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/deck-lab?reWriteBatchedInserts=true
        username: ${POSTGRES_USER:postgres}
        password: ${POSTGRES_PASSWORD:postgres}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

app.seed.cards: true
app.upload-dir: ${IMAGE_UPLOAD_DIR:data/images}
