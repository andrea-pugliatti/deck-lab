spring:
  application:
    name: backend
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:test-api-key}
        chat:
          model: gemini-3.1-flash-lite
  datasource:
    url: jdbc:h2:mem:deck_lab;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  seed.cards: false
  upload-dir: ${IMAGE_UPLOAD_DIR:data/images}
  cors.allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:5173,http://localhost,http://127.0.0.1:5173}
  cookie:
    same-site: ${COOKIE_SAME_SITE:Lax}
    secure: ${COOKIE_SECURE:false}

jwt:
  secret: ejM4YTNjNWQ3ZTkxYmI4Y2U5Mzg1NzlkMmVkMjE5ODk5ZjhkMDgxODg0YzdkNjU5YTJmZWFhMGM1NWFkMDE1YTNmZjRmMWIyYjBiODIyY2QxNWQ2YzE1YjBmMDBhMDg=
  expiration: 900000

refresh-token:
  duration-days: 7
  max-per-user: 5
  cleanup-schedule: "0 0 3 * * *"
  grace-period-seconds: 10
  rate-limit:
    max-attempts: 5
    window-ms: 60000
    cleanup-schedule: "0 */5 * * * *"
