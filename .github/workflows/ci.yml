name: CI

on:
  push:
    branches:
      - main
      - master
      - "**/feature/**"
  pull_request:

jobs:
  backend:
    name: Backend tests and build
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: deck-lab
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Cache Maven local repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run backend tests
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Build backend artifact
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B package -DskipTests

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start backend
        working-directory: backend
        run: |
          java -jar target/*.jar --spring.profiles.active=ci \
            --app.seed.users=true \
            --ai-generation.rate-limit.max-attempts=1000 \
            --auth.login.rate-limit.max-attempts=1000 \
            --auth.register.rate-limit.max-attempts=1000 \
            --deck.validate.rate-limit.max-attempts=1000 \
            --deck.save.rate-limit.max-attempts=1000 \
            --refresh-token.rate-limit.max-attempts=1000 \
            > backend.log 2>&1 &

      - name: Wait for backend readiness
        run: npx wait-on tcp:localhost:8080 --timeout 60000

      - name: Print backend logs on failure
        if: failure()
        run: cat backend/backend.log

      - name: Run Bruno API tests
        working-directory: bruno
        run: bru run --env CI --reporter-junit results.xml --reporter-json results.json

      - name: Upload Bruno Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bruno-test-results
          path: |
            bruno/results.xml
            bruno/results.json

      - name: Upload Backend Logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-logs
          path: backend/backend.log

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Check code formatting
        working-directory: frontend
        run: pnpm format:check

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test:run

      - name: Build frontend application
        working-directory: frontend
        run: pnpm build
