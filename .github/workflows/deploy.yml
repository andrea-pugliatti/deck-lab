name: Deploy to GCP

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: europe-west8
      REPO_NAME: deck-lab
      FRONTEND_BUCKET_NAME: ${{ secrets.GCP_FRONTEND_BUCKET_NAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Docker Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }} ./backend
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: backend-service
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }}
          flags: |
            --add-cloudsql-instances=${{ secrets.GCP_CLOUDSQL_CONNECTION_NAME }}
            --add-volume=name=card-images-volume,type=cloud-storage,bucket=${{ secrets.GCP_IMAGE_BUCKET_NAME }}
            --add-volume-mount=volume=card-images-volume,mount-path=/app/data/images
            --set-env-vars=^##^POSTGRES_USER=${{ secrets.DB_USER }}##SPRING_DATASOURCE_URL=jdbc:postgresql:///deck-lab?cloudSqlInstance=${{ secrets.GCP_CLOUDSQL_CONNECTION_NAME }}&socketFactory=com.google.cloud.sql.postgres.SocketFactory##ALLOWED_CORS_ORIGINS=${{ secrets.ALLOWED_CORS_ORIGINS }}##IMAGE_UPLOAD_DIR=/app/data/images
            --set-secrets=POSTGRES_PASSWORD=DECK_LAB_DB_PASSWORD:latest,GEMINI_API_KEY=DECK_LAB_GEMINI_API_KEY:latest,JWT_SECRET=DECK_LAB_JWT_SECRET:latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Frontend Dependencies & Build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload Static Assets to Cloud Storage Bucket
        uses: google-github-actions/upload-cloud-storage@v3
        with:
          path: ./frontend/dist/
          destination: ${{ env.FRONTEND_BUCKET_NAME }}
          parent: false
          process_gcloudignore: false

      - name: Invalidate Cloud CDN Cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ secrets.GCP_LOAD_BALANCER_NAME }} \
            --path "/*" --async
