info:
  name: Get Deck by ID
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/api/decks/{{createdDeckId}}"
  headers:
    - name: accept
      value: application/json

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: before-request
      code: |-
        if (!bru.getVar("createdDeckId")) {
          bru.setVar("createdDeckId", 1);
        }
    - type: tests
      code: |-
        test("Response should be 200 OK or 404 Not Found", function() {
          expect([200, 404]).to.include(res.status);
        });
        if (res.status === 200) {
          test("Response should return the correct deck details", function() {
            expect(res.body).to.be.an('object');
            expect(res.body.id).to.equal(Number(bru.getVar("createdDeckId")));
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
