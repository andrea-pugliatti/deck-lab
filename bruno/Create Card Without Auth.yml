info:
  name: Create Card Without Auth
  type: http
  seq: 27

http:
  method: POST
  url: "{{baseUrl}}/api/cards"
  headers:
    - name: accept
      value: application/json
    - name: content-type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Unauthorized Card",
        "type": "Normal Monster",
        "description": "Should fail without a token",
        "race": "Spellcaster",
        "attribute": "DARK",
        "archetype": "Unauthorized",
        "imageUrl": "unauthorized.jpg",
        "imageUrlCropped": "unauthorized_cropped.jpg",
        "frameType": "normal",
        "atk": 1000,
        "def": 1000,
        "level": 4
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: tests
      code: |-
        test("Response should be 401 Unauthorized", function() {
          expect(res.status).to.equal(401);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
