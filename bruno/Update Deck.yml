info:
  name: Update Deck
  type: http
  seq: 16

http:
  method: PUT
  url: "{{baseUrl}}/api/decks/{{createdDeckId}}"
  headers:
    - name: accept
      value: application/json
    - name: content-type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
