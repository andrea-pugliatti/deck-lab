runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: before-request
      code: |-
        let validIds = bru.getVar("validCardIds");
        if (validIds && validIds.length >= 14) {
          let deckCards = [];
          for (let i = 0; i < 14; i++) {
            deckCards.push({
              cardId: validIds[i],
              section: "MAIN",
              quantity: i === 13 ? 2 : 3
            });
          }
          let body = req.getBody();
          body.deckCards = deckCards;
          req.setBody(body);
        }
        if (!bru.getVar("createdDeckId")) {
          bru.setVar("createdDeckId", 1);
        }
        if (!bru.getVar("createdCardId")) {
          bru.setVar("createdCardId", 1);
        }
    - type: tests
      code: |-
        test("Response should be 200 OK or 404 Not Found", function() {
          expect([200, 404]).to.include(res.status);
        });
        if (res.status === 200) {
          test("Response should return the updated deck details", function() {
            expect(res.body.name).to.equal("My First Deck (Updated)");
            expect(res.body.deckCards[13].quantity).to.equal(2);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
