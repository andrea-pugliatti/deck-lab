info:
  name: Update Deck
  type: http
  seq: 11

http:
  method: PUT
  url: "{{baseUrl}}/api/decks/{{createdDeckId}}"
  headers:
    - name: accept
      value: application/json
    - name: content-type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "My First Deck (Updated)",
        "description": "An updated test deck",
        "formatName": "TCG",
        "deckCards": [
          {
            "cardId": {{createdCardId}},
            "section": "MAIN",
            "quantity": 2
          }
        ]
      }

runtime:
  scripts:
    - type: before-request
      code: |-
        if (!bru.getVar("createdDeckId")) {
          bru.setVar("createdDeckId", 1);
        }
        if (!bru.getVar("createdCardId")) {
          bru.setVar("createdCardId", 1);
        }
    - type: tests
      code: |-
        test("Response should be 200 OK or 404 Not Found", function() {
          expect([200, 404]).to.include(res.status);
        });
        if (res.status === 200) {
          test("Response should return the updated deck details", function() {
            expect(res.body.name).to.equal("My First Deck (Updated)");
            expect(res.body.deckCards[0].quantity).to.equal(2);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
