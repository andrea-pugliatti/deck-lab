runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");
        const baseUrl = bru.getVar("baseUrl") || "http://localhost:8080";
        try {
          const res = await axios.get(`${baseUrl}/api/cards?type=Normal%20Monster&size=100`);
          const cards = res.data.content;
          if (cards && cards.length >= 14) {
            const validIds = cards.map(c => c.id);
            let deckCards = [];
            for (let i = 0; i < 14; i++) {
              deckCards.push({
                cardId: validIds[i],
                section: "MAIN",
                quantity: i === 13 ? 2 : 3
              });
            }
            let body = req.getBody();
            body.deckCards = deckCards;
            req.setBody(body);
          }
        } catch (err) {
          console.error("Failed to fetch cards in before-request script:", err.message);
        }
        if (!bru.getVar("createdDeckId")) {
          bru.setVar("createdDeckId", 1);
        }
        if (!bru.getVar("createdCardId")) {
          bru.setVar("createdCardId", 1);
        }
    - type: tests
      code: |-
        test("Response should be 200 OK or 404 Not Found", function() {
          expect([200, 404]).to.include(res.status);
        });
        if (res.status === 200) {
          test("Response should return the updated deck details", function() {
            expect(res.body.name).to.equal("My First Deck (Updated)");
            expect(res.body.deckCards[13].quantity).to.equal(2);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
