info:
  name: Get Full Image
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/api/cards/images/{{imageFilename}}"
  headers:
    - name: accept
      value: image/jpeg

runtime:
  variables:
    - name: imageFilename
      value: 40941889.jpg
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: tests
      code: |-
        test("Response should be 200 OK or 404 Not Found", function() {
          expect([200, 404]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
