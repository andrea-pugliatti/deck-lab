info:
  name: Refresh Token Missing
  type: http
  seq: 25

http:
  method: POST
  url: "{{baseUrl}}/api/auth/refresh"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: tests
      code: |-
        test("Response should be 401 Unauthorized", function() {
          expect(res.status).to.equal(401);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
