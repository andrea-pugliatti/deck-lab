runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: before-request
      code: |-
        let validIds = bru.getVar("validCardIds");
        if (validIds && validIds.length >= 14) {
          let deckCards = [];
          for (let i = 0; i < 14; i++) {
            deckCards.push({
              cardId: validIds[i],
              section: "MAIN",
              quantity: 3
            });
          }
          let body = req.getBody();
          body.deckCards = deckCards;
          req.setBody(body);
        }
        if (!bru.getVar("createdCardId")) {
          bru.setVar("createdCardId", 1);
        }
    - type: tests
      code: |-
        test("Response should be 201 Created", function() {
          expect(res.status).to.equal(201);
        });
        test("Response should return the created deck details", function() {
          expect(res.body.name).to.equal("My First Deck");
          expect(res.body.id).to.exist;
        });
        test("Save created deck ID for subsequent requests", function() {
          if (res.status === 201 && res.body.id) {
            bru.setVar("createdDeckId", res.body.id);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
