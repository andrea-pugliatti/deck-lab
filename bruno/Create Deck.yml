info:
  name: Create Deck
  type: http
  seq: 14

http:
  method: POST
  url: "{{baseUrl}}/api/decks"
  headers:
    - name: accept
      value: application/json
    - name: content-type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "My First Deck",
        "description": "A test deck created via API",
        "formatName": "TCG",
        "deckCards": {{lastUsedDeckCards}}
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");
        const baseUrl = bru.getVar("baseUrl") || "http://localhost:8080";
        const token = bru.getVar("accessToken");
        try {
          const res = await axios.get(`${baseUrl}/api/cards?type=Normal%20Monster&size=100`);
          let cards = res.data.content || [];
          const needed = 14;
          if (cards.length < needed) {
            const createCount = needed - cards.length;
            for (let i = 0; i < createCount; i++) {
              const cardRes = await axios.post(
                `${baseUrl}/api/cards`,
                {
                  name: `Normal Monster ${Date.now()}_${i}`,
                  type: "Normal Monster",
                  description: "A normal monster card generated dynamically for testing",
                  race: "Spellcaster",
                  attribute: "DARK",
                  archetype: "Dark Magician",
                  imageUrl: "card.jpg",
                  imageUrlCropped: "card_cropped.jpg",
                  frameType: "normal",
                  atk: 1000 + i,
                  def: 1000 + i,
                  level: 4
                },
                {
                  headers: {
                    Authorization: `Bearer ${token}`,
                    Accept: "application/json",
                    "Content-Type": "application/json"
                  }
                }
              );
              if (cardRes.data && cardRes.data.id) {
                cards.push(cardRes.data);
              }
            }
          }
          if (cards.length >= needed) {
            const validIds = cards.map(c => c.id);
            let deckCards = [];
            for (let i = 0; i < needed; i++) {
              deckCards.push({
                cardId: validIds[i],
                section: "MAIN",
                quantity: 3
              });
            }
            let body = req.getBody();
            body.deckCards = deckCards;
            req.setBody(body);
            bru.setVar("lastUsedDeckCards", deckCards);
          } else {
            throw new Error(`Failed to create enough cards. Have ${cards.length}, need ${needed}`);
          }
        } catch (err) {
          console.error("Failed to fetch/create cards in before-request script:", err.response ? err.response.data : err.message);
          const fallbackCards = [
            {
              "cardId": 100,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 2313,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 14,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 41,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 5,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 642,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 7,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 832,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 91,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 10,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 5151,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 124,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 1133,
              "section": "MAIN",
              "quantity": 3
            },
            {
              "cardId": 1415,
              "section": "MAIN",
              "quantity": 3
            }
          ];
          bru.setVar("lastUsedDeckCards", fallbackCards);
        }
        if (!bru.getVar("createdCardId")) {
          bru.setVar("createdCardId", 1);
        }
    - type: tests
      code: |-
        test("Response should be 201 Created", function() {
          expect(res.status).to.equal(201);
        });
        test("Response should return the created deck details", function() {
          expect(res.body.name).to.equal("My First Deck");
          expect(res.body.id).to.exist;
        });
        test("Save created deck ID for subsequent requests", function() {
          if (res.status === 201 && res.body.id) {
            bru.setVar("createdDeckId", res.body.id);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
