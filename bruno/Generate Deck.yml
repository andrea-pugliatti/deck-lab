info:
  name: Generate Deck
  type: http
  seq: 21

http:
  method: post
  url: "{{baseUrl}}/api/decks/ai/generate"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "archetype": "Frog",
        "strategy": "OTK",
        "formatName": "Edison",
        "customPrompt": ""
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: tests
      code: |-
        test("Response should be 200 OK", function() {
          expect(res.status).to.equal(200);
        });
        if (res.status === 200) {
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
