info:
  name: Auth Login Invalid Credentials
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "admin",
        "password": "wrong-password"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: tests
      code: |-
        test("Response should be 401 Unauthorized", function() {
          expect(res.status).to.equal(401);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
