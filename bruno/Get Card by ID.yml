info:
  name: Get Card by ID
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/api/cards/{{createdCardId}}"
  headers:
    - name: accept
      value: application/json

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: before-request
      code: |-
        if (!bru.getVar("createdCardId")) {
          bru.setVar("createdCardId", bru.getEnvVar("cardId") || "1");
        }
    - type: tests
      code: |-
        test("Response should be 200 OK", function() {
          expect(res.status).to.equal(200);
        });
        test("Response should be an object with card details", function() {
          expect(res.body).to.be.an('object');
          expect(res.body.id).to.equal(Number(bru.getVar("createdCardId")));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
