info:
  name: Delete Deck
  type: http
  seq: 17

http:
  method: DELETE
  url: "{{baseUrl}}/api/decks/{{createdDeckId}}"
  headers:
    - name: accept
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: before-request
      code: |-
        if (!bru.getVar("createdDeckId")) {
          bru.setVar("createdDeckId", 1);
        }
    - type: after-response
      code: |-
        const axios = require("axios");
        const baseUrl = bru.getVar("baseUrl") || "http://localhost:8080";
        const token = bru.getVar("accessToken");
        const createdCardIds = bru.getVar("createdCardIds");
        if (createdCardIds && createdCardIds.length > 0) {
          console.log(`Cleaning up ${createdCardIds.length} dynamically created cards...`);
          for (const cardId of createdCardIds) {
            try {
              await axios.delete(`${baseUrl}/api/cards/${cardId}`, {
                headers: {
                  Authorization: `Bearer ${token}`
                }
              });
              console.log(`Successfully deleted card ID ${cardId}`);
            } catch (err) {
              console.error(`Failed to delete card ID ${cardId}:`, err.message);
            }
          }
          bru.setVar("createdCardIds", []);
        }
    - type: tests
      code: |-
        test("Response should be 204 No Content or 404 Not Found", function() {
          expect([204, 404]).to.include(res.status);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
