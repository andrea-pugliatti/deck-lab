info:
  name: Get Cards
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/api/cards?type=Normal%20Monster&size=100"
  headers:
    - name: accept
      value: application/json

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: tests
      code: |-
        test("Response should be 200 OK", function() {
          expect(res.status).to.equal(200);
        });
        test("Response should be an object containing an array", function() {
          expect(res.body.content).to.exist;
          expect(res.body.content).to.be.an('array');
          const cards = res.body.content;
          if (cards && cards.length > 0) {
            const ids = cards.map(c => c.id).filter(id => id != null);
            bru.setVar("validCardIds", ids);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
