info:
  name: Validate Deck Invalid Quantity
  type: http
  seq: 20

http:
  method: POST
  url: "{{baseUrl}}/api/decks/validate"
  headers:
    - name: accept
      value: application/json
    - name: content-type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "Invalid Quantity Deck",
        "description": "Should fail validation",
        "formatName": "TCG",
        "deckCards": [
          {
            "cardId": 1,
            "section": "MAIN",
            "quantity": 4
          }
        ]
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: tests
      code: |-
        test("Response should be 400 Bad Request", function() {
          expect(res.status).to.equal(400);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
