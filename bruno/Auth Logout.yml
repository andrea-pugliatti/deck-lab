info:
  name: Auth Logout
  type: http
  seq: 17

http:
  method: POST
  url: "{{baseUrl}}/api/auth/logout"
  headers:
    - name: Cookie
      value: refreshToken={{refreshToken}}

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080
  scripts:
    - type: after-response
      code: |-
        // Clear Bruno runtime variables so no stale tokens linger
        bru.setVar("accessToken", "");
        bru.setVar("refreshToken", "");

        console.log("Tokens cleared from Bruno. State reset.");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
