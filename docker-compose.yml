services:
  db:
    image: postgres:16-alpine
    container_name: deck-lab-db
    environment:
      POSTGRES_DB: deck-lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deck-lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deck-lab-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/deck-lab?reWriteBatchedInserts=true
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - IMAGE_UPLOAD_DIR=/app/data/images
    volumes:
      - card-images:/app/data/images
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deck-lab-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  card-images:
